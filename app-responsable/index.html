<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2457a6">
  <title>APP Tutor - Escaner QR</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="../assets/logo-ispi-4019.jpg">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="brand">
        <img class="logo" src="../assets/logo-ispi-4019.jpg" alt="Logo ISPI 4019">
        <div>
          <h1>Registro de asistencia</h1>
          <p>ISPI 4019 San Juan Bautista - Tutor</p>
        </div>
      </div>

      <section class="form config-card">
        <label>
          URL del servidor Apps Script
          <input id="serverUrl" type="url" value="https://script.google.com/macros/s/AKfycbyVSudEA1sC201TMlzMyHuSoUVcwrepc-PJGISSTQScd4o2lUHsK2UcubfGuWKh2Xi2Vg/exec">
        </label>
        <label>
          Token del tutor
          <input id="responsableToken" type="password" autocomplete="current-password" placeholder="Token asignado por la institucion">
        </label>
        <div class="actions">
          <button id="saveConfig" class="secondary" type="button">Guardar</button>
          <button id="clearConfig" class="ghost" type="button">Limpiar</button>
        </div>
      </section>

      <section class="scanner">
        <div id="reader"></div>
        <div class="actions">
          <button id="startBtn" class="primary" type="button">Escanear QR</button>
          <button id="stopBtn" class="secondary" type="button" disabled>Detener</button>
        </div>
      </section>

      <section class="manual">
        <details>
          <summary>Carga manual del QR</summary>
          <textarea id="manualPayload" placeholder="Pegar contenido tecnico de APP Alumno"></textarea>
          <button id="manualBtn" class="secondary" type="button">Registrar manualmente</button>
        </details>
      </section>

      <section id="status" class="status idle">Listo para escanear.</section>

      <section class="history">
        <h2>Ultimos registros</h2>
        <ol id="historyList"></ol>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
