<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#106b5f">
  <title>Credencial Alumno - QR Pasantias</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="../assets/logo-ispi-4019.jpg">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="brand">
        <img class="logo" src="../assets/logo-ispi-4019.jpg" alt="Logo ISPI 4019">
        <div>
          <h1>Credencial de pasantias</h1>
          <p>ISPI 4019 San Juan Bautista</p>
        </div>
      </div>

      <form id="studentForm" class="form">
        <label>
          Token institucional
          <input id="token" name="token" autocomplete="off" required minlength="6" placeholder="Ej: ALU-A001-2026-X9K2">
        </label>

        <label>
          Nombre visible en esta credencial
          <input id="nombre" name="nombre" autocomplete="name" required minlength="3" placeholder="Ej: Perez, Juan">
        </label>

        <button class="primary" type="submit">GUARDAR Y MOSTRAR QR</button>
      </form>

      <section id="result" class="result" hidden>
        <div class="credential">
          <img class="credential-logo" src="../assets/logo-ispi-4019.jpg" alt="">
          <strong id="studentName"></strong>
          <span>Credencial QR de pasantias</span>
          <div id="qrcode" class="qrbox" aria-label="Codigo QR generado"></div>
          <small id="issuedAt"></small>
        </div>
        <div class="actions">
          <button id="downloadBtn" class="secondary" type="button">Descargar QR</button>
          <button id="resetBtn" class="ghost" type="button">Cambiar datos</button>
        </div>
        <details>
          <summary>Ver contenido tecnico</summary>
          <textarea id="payloadText" readonly></textarea>
        </details>
      </section>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
